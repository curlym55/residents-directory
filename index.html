for (var r in refs) villaCoords[r] = refs[r];

var sortedRefs = Object.keys(refs).map(Number).sort(function(a,b){return a-b;});

for (var v = 1; v <= 204; v++) {
  if (villaCoords[v]) continue;
  
  var before = null, after = null;
  for (var i = 0; i < sortedRefs.length; i++) {
    if (sortedRefs[i] < v) before = sortedRefs[i];
    if (sortedRefs[i] > v && after === null) after = sortedRefs[i];
  }
  
  if (before !== null && after !== null) {
    var t = (v - before) / (after - before);
    villaCoords[v] = [
      lerp(refs[before][0], refs[after][0], t),
      lerp(refs[before][1], refs[after][1], t)
    ];
  } else if (before !== null) {
    var prevBefore = sortedRefs[sortedRefs.indexOf(before) - 1];
    if (prevBefore) {
      var dx = refs[before][0] - refs[prevBefore][0];
      var dy = refs[before][1] - refs[prevBefore][1];
      var step = v - before;
      villaCoords[v] = [refs[before][0] + dx * step, refs[before][1] + dy * step];
    } else {
      villaCoords[v] = [refs[before][0] + (v - before), refs[before][1]];
    }
  } else if (after !== null) {
    villaCoords[v] = [refs[after][0] - (after - v), refs[after][1]];
  }
}

var searchBox = document.getElementById('searchBox');
var resultsDiv = document.getElementById('results');
var countDiv = document.getElementById('count');
var currentHighlight = null;
var markersCreated = false;

function performSearch() {
  var searchText = searchBox.value;
  
  if (!searchText || searchText.trim() === '') {
    resultsDiv.innerHTML = '<div class="welcome"><h2>👋</h2><p>Start typing to search</p></div>';
    countDiv.innerHTML = '';
    return;
  }
  
  var query = searchText.toLowerCase().trim();
  var queryNoSpaces = query.replace(/\s/g, '');
  var matches = [];
  
  for (var i = 0; i < residents.length; i++) {
    var r = residents[i];
    var matched = false;
    
    if (/^\d{1,3}$/.test(searchText)) {
      if (String(r.villa) === searchText) matched = true;
    } else {
      var fullName = (r.firstName + ' ' + r.lastName).toLowerCase();
      if (fullName.indexOf(query) >= 0) matched = true;
      
      if (!matched && /^\d{4,}$/.test(queryNoSpaces)) {
        var phone = r.phone.replace(/\s/g, '');
        if (phone.indexOf(queryNoSpaces) >= 0) matched = true;
      }
      
      if (!matched && r.email) {
        var email = r.email.toLowerCase();
        if (email.indexOf(query) >= 0) matched = true;
      }
      
      if (!matched && r.role) {
        var role = r.role.toLowerCase();
        if (role.indexOf(query) >= 0) matched = true;
      }
    }
    
    if (matched) matches.push(r);
  }
  
  if (matches.length === 0) {
    resultsDiv.innerHTML = '<div class="welcome"><h2>🔍</h2><p>No residents found</p></div>';
    countDiv.innerHTML = '';
    return;
  }
  
  countDiv.innerHTML = matches.length + ' resident' + (matches.length === 1 ? '' : 's') + ' found';
  
  var byVilla = {};
  for (var i = 0; i < matches.length; i++) {
    var r = matches[i];
    if (!byVilla[r.villa]) byVilla[r.villa] = [];
    byVilla[r.villa].push(r);
  }
  
  var villaNumbers = Object.keys(byVilla).sort(function(a, b) { return Number(a) - Number(b); });
  
  var html = '';
  for (var v = 0; v < villaNumbers.length; v++) {
    var villaNum = villaNumbers[v];
    var villaResidents = byVilla[villaNum];
    
    html += '<div class="villa"><div class="villa-header">Villa ' + (villaNum === '0' ? 'Management' : villaNum) + '</div>';
    
    for (var r = 0; r < villaResidents.length; r++) {
      var resident = villaResidents[r];
      html += '<div class="resident"><div class="name">' + resident.firstName + ' ' + resident.lastName + '</div>';
      if (resident.role) html += '<div class="role">' + resident.role + '</div>';
      html += '<div class="contact">📞 <a href="tel:' + resident.phone.replace(/\s/g, '') + '">' + resident.phone + '</a></div>';
      if (resident.email) html += '<div class="contact">✉️ <a href="mailto:' + resident.email + '">' + resident.email + '</a></div>';
      if (villaNum !== '0' && villaCoords[villaNum]) {
        html += '<button class="show-map-btn" onclick="showVillaOnMap(' + villaNum + ')">📍 Show Villa ' + villaNum + ' on Map</button>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  
  resultsDiv.innerHTML = html;
}

function openMap() {
  document.getElementById('mapModal').classList.add('show');
  document.body.style.overflow = 'hidden';
  if (!markersCreated) createMarkers();
  if (currentHighlight) {
    var marker = document.getElementById('marker-' + currentHighlight);
    if (marker) marker.classList.remove('highlight');
    currentHighlight = null;
  }
  document.getElementById('mapTitle').textContent = 'GemLife Palmwoods Village Map - Click any villa';
}

function closeMap() {
  document.getElementById('mapModal').classList.remove('show');
  document.body.style.overflow = 'auto';
}

function closeMapOnBackground(event) {
  if (event.target.id === 'mapModal') closeMap();
}

function showVillaOnMap(villaNum) {
  openMap();
  setTimeout(function() {
    var marker = document.getElementById('marker-' + villaNum);
    if (marker) {
      if (currentHighlight) {
        var oldMarker = document.getElementById('marker-' + currentHighlight);
        if (oldMarker) oldMarker.classList.remove('highlight');
      }
      marker.classList.add('highlight');
      currentHighlight = villaNum;
      marker.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      var villaResidents = residents.filter(function(r) { return String(r.villa) === String(villaNum); });
      if (villaResidents.length > 0) {
        var names = villaResidents.map(function(r) { return r.firstName + ' ' + r.lastName; }).join(', ');
        document.getElementById('mapTitle').textContent = 'Villa ' + villaNum + ': ' + names;
      } else {
        document.getElementById('mapTitle').textContent = 'Villa ' + villaNum;
      }
    }
  }, 100);
}

function createMarkers() {
  var container = document.getElementById('mapContainer');
  
  for (var villa in villaCoords) {
    var coords = villaCoords[villa];
    var marker = document.createElement('div');
    marker.className = 'villa-marker';
    marker.id = 'marker-' + villa;
    marker.style.left = coords[0] + '%';
    marker.style.top = coords[1] + '%';
    marker.textContent = villa;
    marker.setAttribute('data-villa', villa);
    marker.onclick = function(e) {
      e.stopPropagation();
      var v = this.getAttribute('data-villa');
      showVillaInfo(v);
    };
    container.appendChild(marker);
  }
  
  markersCreated = true;
}

function showVillaInfo(villaNum) {
  var villaResidents = residents.filter(function(r) { return String(r.villa) === villaNum; });
  
  if (currentHighlight) {
    var oldMarker = document.getElementById('marker-' + currentHighlight);
    if (oldMarker) oldMarker.classList.remove('highlight');
  }
  
  var marker = document.getElementById('marker-' + villaNum);
  if (marker) {
    marker.classList.add('highlight');
    currentHighlight = villaNum;
  }
  
  if (villaResidents.length > 0) {
    var info = 'Villa ' + villaNum + ':\n\n';
    villaResidents.forEach(function(r) {
      info += r.firstName + ' ' + r.lastName;
      if (r.role) info += ' (' + r.role + ')';
      info += '\n';
      if (r.phone) info += '📞 ' + r.phone + '\n';
      if (r.email) info += '✉️ ' + r.email + '\n';
      info += '\n';
    });
    alert(info);
    
    var names = villaResidents.map(function(r) { return r.firstName + ' ' + r.lastName; }).join(', ');
    document.getElementById('mapTitle').textContent = 'Villa ' + villaNum + ': ' + names;
  } else {
    document.getElementById('mapTitle').textContent = 'Villa ' + villaNum + ' - Vacant';
  }
}

searchBox.addEventListener('input', performSearch);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeMap();
});
performSearch();
</script>



<div class="print-area" id="printArea">
  <div class="print-title">GemLife Palmwoods Village Directory</div>
  <div class="print-subtitle" id="printSubtitle"></div>
  <div class="print-row header-row">
    <div class="print-col-villa">Villa</div>
    <div class="print-col-name">Name</div>
    <div class="print-col-phone">Phone</div>
    <div class="print-col-email">Email</div>
  </div>
  <div id="printRows"></div>
</div>
<script>
function printDirectory() {
  var today = new Date().toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});
  document.getElementById('printSubtitle').textContent = 'Printed ' + today + '  •  ' + residents.length + ' residents';
  var sorted = residents.slice().sort(function(a,b){ return a.villa - b.villa || a.lastName.localeCompare(b.lastName); });

  // Group rows by villa so all residents in one villa stay together
  var villaGroups = [];
  var lastVilla = null;
  sorted.forEach(function(r) {
    if (r.villa !== lastVilla) {
      villaGroups.push([]);
      lastVilla = r.villa;
    }
    villaGroups[villaGroups.length - 1].push(r);
  });

  var colours = ['#EEF2FF', '#F0FDF4'];
  var html = '';
  villaGroups.forEach(function(group, i) {
    var bg = colours[i % 2];
    // Wrap the whole villa group in a div with page-break-inside: avoid
    html += '<div style="page-break-inside: avoid;">';
    group.forEach(function(r) {
      var villa = r.villa === 0 ? 'Staff' : r.villa;
      html += '<div class="print-row" style="background:' + bg + '">' +
        '<div class="print-col-villa">' + villa + '</div>' +
        '<div class="print-col-name">' + r.firstName + ' ' + r.lastName + '</div>' +
        '<div class="print-col-phone">' + r.phone + '</div>' +
        '<div class="print-col-email">' + r.email + '</div>' +
      '</div>';
    });
    html += '</div>';
  });

  document.getElementById('printRows').innerHTML = html;
  window.print();
}
</script>
